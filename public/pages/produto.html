<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciador de Produtos</title>
    <!-- Carrega o CSS da pasta public/ (não colocar "public/" no caminho!) -->
    <link rel="stylesheet" href="../assets/css/produto.css" />
  </head>
  <body>
    <header>
      <div class="container-header">
        <h1>📋 Gerenciador de Produtos</h1>
        <p class="subtitle">Sistema de Gestão de Produtos</p>
      </div>
    </header>
    <div class="nav">
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="../pages/produto.html">Produtos</a></li>
        <li><a href="../pages/about.html">Sobre nós</a></li>
      </ul>
    </div>

    <main>
      <div class="container">
        <!-- ============================== -->
        <!-- SEÇÃO DO FORMULÁRIO            -->
        <!-- ============================== -->
        <section class="form-section">
          <h2>Adicionar ou Editar Produtos</h2>
          <form id="productForm">
            <!-- Campo: Nome -->
            <div class="form-group">
              <label for="nome">Nome do produto:</label>
              <input
                type="text"
                id="nome"
                name="nome"
                placeholder="Ex: Celular"
                required
              />
            </div>

            <!-- Campo: Preco -->
            <div class="form-group">
              <label for="preco">Preço:</label>
              <input
                type="text"
                id="preco"
                name="preco"
                placeholder="R$ 1000.00"
                required
              />
            </div>
            <!-- Campo: Estoque -->
            <div class="form-group">
              <label for="estoque">Estoque:</label>
              <input
                type="number"
                id="estoque"
                name="estoque"
                placeholder="Digite a quantidade em estoque"
                required
              />
            </div>

            <!-- Campo: Categoria -->
            <div class="form-group">
              <label for="categoria">Categoria:</label>
              <input
                type="text"
                id="categoria"
                name="categoria"
                placeholder="Ex: Tecnlogia"
                required
              />
            </div>

            <!-- Botões de ação do formulário -->
            <div class="form-buttons">
              <button type="submit" class="btn btn-primary">
                Salvar Produto
              </button>
              <button type="button" class="btn btn-secondary" id="btnLimpar">
                Limpar Formulário
              </button>
            </div>
          </form>
        </section>

        <!-- ============================== -->
        <!-- SEÇÃO DE LISTAGEM              -->
        <!-- ============================== -->
        <section class="list-section">
          <h2>Lista de Produtos</h2>

          <!-- Controles: recarregar e pesquisar -->
          <div class="list-controls">
            <button class="btn btn-success" id="btnRecarregar">
              🔄 Recarregar Lista
            </button>
            <div class="search-box">
              <select id="searchType" title="Tipo de busca">
                <option value="nome">Buscar por Nome</option>
                <option value="id">Buscar por ID</option>
              </select>
              <input
                type="text"
                id="searchInput"
                placeholder="Digite o valor para buscar..."
              />
              <button class="btn btn-primary" id="btnBuscar">Buscar</button>
            </div>
          </div>

          <!-- Mensagem de carregando -->
          <div id="loadingMessage" class="message message-info">
            Carregando Produtos...
          </div>

          <!-- Mensagem de lista vazia -->
          <div id="emptyMessage" class="message message-info">
            Nenhum Produto cadastrado.
          </div>
          <!-- Tabela será gerada pelo script.js -->
          <div id="productsList" class="products-table-container"></div>
          <div class="alignModal">
            <div id="modalMessage" class="modal-message">
              <div class="modal-content">
                <p id="modalText"></p>
                <button class="btn btn-primary" onclick="fecharModal()">
                  Fechar
                </button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <footer>
      <p>© 2026 - Sistema de Gestão de Produtos</p>
    </footer>

    <!-- Modal de Mensagens (feedback ao usuário) -->

    <!-- Script.js carregado no final do body para garantir que
       o HTML já esteja montado antes do JS executar -->
    <script src="../assets/js/script.js"></script>
  </body>
</html>
